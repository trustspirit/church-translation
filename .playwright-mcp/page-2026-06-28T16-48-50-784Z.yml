            - img "하나님 아버지와 예수 그리스도" [ref=e42]
            - paragraph [ref=e43]: 개요
            - heading "신회" [level=1] [ref=e44]
          - generic [ref=e45]:
            - paragraph [ref=e46]:
              - text: 교회의 신앙개조 제1조에는 이렇게 언급되어 있다. “우리는 영원하신 아버지 하나님과 그의 아들 예수 그리스도와 성신을 믿는다.”
              - link "1" [ref=e47] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/godhead?lang=kor#note1
                - superscript [ref=e48]: "1"
              - text: 이 세 분은 신회를 구성한다. 그분들은 이 세상과 하늘에 계신 아버지의 모든 피조물을 다스리신다.
            - paragraph [ref=e49]:
              - text: 신회의 구성원들에 대한 후기 성도들의 관점은 여러 면에서 다른 기독교인들의 관점과 일치하지만, 몇 가지 중요한 차이점이 있다. 후기 성도들은
              - link "예수 그리스도" [ref=e50] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/jesus-christ?lang=kor
              - text: 의 이름으로
              - link "하나님 아버지" [ref=e51] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/god-the-father?lang=kor
              - text: 께 기도한다. 그들은 하나님 아버지를
              - link "경배" [ref=e52] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/worship?lang=kor
              - text: 의 궁극적 대상으로, 그분의 아들을 주님이자 구속주로,
              - link "성령" [ref=e53] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/holy-ghost?lang=kor
              - text: 을 하나님 아버지와 아들의 사자이자 계시자로 받아들인다. 그러나 후기 성도들이 다른 기독교 교파들과 다른 점은 하나님과 예수 그리스도께서는 영화롭게 된 육체를 가진 존재이며 신회의 각 구성원은 개별적인 존재라고 믿는다는 점이다.
            - paragraph [ref=e54]:
              - text: 신회에 대한 참된 교리는 구주의 지상 성역과 사도들의 죽음 이후에 있었던
              - link "배도" [ref=e55] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/apostasy?lang=kor
              - text: 기간에 상실되었다. 이 교리는 14세 된
              - link "조셉 스미스" [ref=e56] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/joseph-smith?lang=kor
              - text: 가
              - link "첫번째 시현" [ref=e57] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/first-vision?lang=kor
              - text: 을 보았을 때 회복되기 시작했다.
              - link "2" [ref=e58] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/godhead?lang=kor#note2
                - superscript [ref=e59]: "2"
              - text: 첫번째 시현에 대한 선지자 조셉의 기록과 그의 여러 가르침을 통해 우리는 신회의 구성원이 세 분의 개별적인 존재라는 사실을 알 수 있다. 하나님 아버지와 아들은 만져 볼 수 있는 살과 뼈로 된 몸을 지니셨으며, 성신은
              - link "영" [ref=e60] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/spirit?lang=kor
              - text: 의 인격체이다.
              - link "3" [ref=e61] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/godhead?lang=kor#note3
                - superscript [ref=e62]: "3"
            - paragraph [ref=e63]:
              - text: 신회의 구성원들은 각각 서로 다른 역할을 가진 개별적인 존재이지만, 목적과 교리 면에서 하나이다. 그분들은 하늘 아버지께서 마련하신 신성한
              - link "구원의 계획" [ref=e64] [cursor=pointer]:
                - /url: /study/manual/gospel-topics/plan-of-salvation?lang=kor
              - text: 을 이루는 일에서 완전히 하나가 되신다.
