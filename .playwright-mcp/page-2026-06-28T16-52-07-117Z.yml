                - paragraph [ref=e387]: 올리버 카우드리는 이 여러 사건을 다음과 같이 기술하였다. “결코 잊혀지지 않을 날들이었다－하늘의 영감으로 말하여지는 음성을 들으며 앉아 있는 동안 이 가슴은 한량없는 감사를 느꼈다! 하루하루 나는 계속하여 방해받지 않고 ‘몰몬경’이라 불리는 역사 기록을, 니파이인이 ‘해석기’라 말하곤 했던 우림과 둠밈을 가지고 그가 번역하는 대로 그의 입으로부터 받아 적었다.
                - paragraph [ref=e388]: “단지 몇 마디 말로써 몰몬과 그의 충실한 아들 모로나이가 기술한, 한때 하늘의 사랑과 은혜를 입었던 백성의 흥미로운 기사를 이야기한다는 것은 지금의 나의 의도를 바꾸게 되는 것이다. 그러므로 나는 이를 후일로 미루고, 서문에서 말하였듯이, 이 교회의 일어남과 직접적으로 관련이 있는 몇 가지 사건으로 곧바로 넘어가기로 하겠다. 이것은 완고한 자들의 찌푸린 얼굴과 위선자들의 비방 가운데서도 앞으로 나아가서 그리스도의 복음을 품속으로 받아들인 수천의 사람들에게 즐거움을 주는 일이 될 수 있으리라.
                - paragraph [ref=e389]: “건실한 정신을 지닌 사람이라면, 특히 부패가 사람들 사이에 채택되고 있는 모든 형식과 체제 위에 의구심을 만연시켰을 때에는, 어느 누구라도 사람들이 그리스도의 교회를 세워 나갈 정확한 방법에 대하여 구주의 입으로부터 니파이인에게 주어진 지시를 번역하고 기록할 때, 예수 그리스도의 부활로 인한 선한 양심에 순응하기 위하여 물의 무덤에 장사됨으로써 기꺼이 행하고자 하는 마음을 나타내는 특권을 갈망하지 않을 수 없으리라.
                - paragraph [ref=e390]: “구주께서 이 대륙 위에서 야곱의 후손의 남은 자들에게 성역을 베푸신 기사를 기록하고 난 후에는, 선지자가 그렇게 되리라 말한 대로, 어둠이 땅을 덮을 것이며 캄캄함이 백성들의 생각을 가렸음을 쉽게 알 수 있었다. 더 깊이 생각해 보건대, 종교에 관한 커다란 분쟁과 소란의 와중에서 아무도 복음의 의식을 집행할 수 있는 하나님으로부터 오는 권세를 갖고 있지 않다는 사실도 마찬가지로 쉽게 알 수 있었다. 왜냐하면 예수에 대한 간증이 다름 아닌 예언의 영이며, 예수께서 지상에 백성을 가졌던 이 세상의 모든 시대에 걸쳐, 그의 종교가 직접적인 계시에 의해 기초가 놓여지고 설립되고 유지되었다는 것을 생각할 때, 과연 계시를 부인하는 사람들이 그리스도의 이름으로 의식을 집행할 권세가 있을까 하는 의문이 제기될 수 있기 때문이다. 이러한 사실들이 묻혀지고 그들의 간계가 위험에 빠지게 된 사람들에 의해 주의 깊게 은폐되었다 하더라도, 한 번 사람들의 얼굴에 비춰지도록 허용된다면, 그것들은 이미 우리에게 더 이상 묻혀진 것이 아니었으며, 우리는 다만 ‘일어나 침례 받으라’는 계명이 주어지기만을 기다릴 따름이었다.
                - paragraph [ref=e391]: “이것은 오래 바라지 않아 실현되었다. 자비가 풍성하시고 겸손한 자의 충실한 기도에 언제나 기꺼이 응답해 주시는 주께서, 우리가 사람들의 거처에서 멀리 떨어져 간절히 그에게 부르짖었을 때, 당신의 뜻을 우리에게 보이고자 낮게 임하셨던 것이다. 돌연 마치 영원 가운데서 온 것같이 구속주의 음성이 우리에게 평강을 말씀하셨으며, 한편으로 휘장이 갈라지고 하나님의 천사가 영광을 입고 내려와 간절히 바라던 말씀과 회개의 복음의 열쇠를 전해 주었다. 얼마나 기뻤던가! 얼마나 기이하였던가! 얼마나 놀라웠던가! 세상이 고통을 당하며 혼란에 빠져 있을 동안－수백만의 사람들이 앞 못 보는 자처럼 벽을 더듬고 있을 때, 그리고 모든 사람이 범부와도 같이 불확실한 것에 의존하고 있을 때, 우리의 눈은 보았고, 우리의 귀는 들었으니, 마치 눈부신 햇빛 속에서처럼, 아니, 그 이상의－자연의 대지 위에 그 찬란함을 쏟아내리던 오월 햇살의 광채보다도 더 밝은 속에서였다! 그때, 부드러웠으나 중심까지 꿰뚫는 그의 음성과, ‘나는 너희의 동역자니라’하는 그의 말은 모든 두려움을 사라지게 하였다. 우리는 귀 기울였고 우리는 바라보았으며 우리는 찬탄하였다! 그것은 영광에서 온 천사의 음성이었고 그것은 지극히 높으신 이에게서 온 말씀이었다! 주의 사랑이 우리의 영혼을 불붙게 하는 동안, 우리는 들으면서 기뻐하였고 우리는 전능자의 시현에 감싸여 있었다! 어디에 의심할 여지가 있던가? 아무데도 없었다. 불확실성은 달아났고 의심은 가라앉아 다시는 떠오르지 못하였으며, 한편으로 꾸민 이야기와 속임수는 영원히 달아났다!
                - paragraph [ref=e392]: “그러나 사랑하는 형제여, 생각해 보라. 잠시 더 생각해 보라. ‘나의 동료 종들인 너희에게 메시야의 이름으로 나는 이 신권과 이 권세를 부여하노라. 이는 레위의 아들들이 또다시 의롭게 주께 제물을 바칠 수 있도록 땅에 머물러 있으리라!’고 그가 말하며, 그의 손으로부터 우리가 성신권을 받았을 때, 어떠한 기쁨이 우리 마음에 가득 찼으며 또 어떠한 놀라움으로 우리가 무릎을 꿇었는지를! (그러한 축복을 받는데 그 누가 무릎을 꿇지 않을 수 있단 말인가!)
                - paragraph [ref=e393]:
                  - text: “나는 이 마음의 느낌이나 이때에 우리를 둘러쌌던 장엄한 아름다움이나 영광을 여러분에게 그려내려고 시도하지 아니하리라. 그러나 세상이나 사람들이 세월을 통해 얻은 능변으로도 이 거룩한 존재처럼 흥미롭고 숭고한 방식으로 언어를 구사하기 시작할 수 없음을 내가 말할 때에 여러분은 나의 말을 믿으리라. 그렇다. 이 세상이라 할지라도 그 기쁨을 주거나 그 평화를 누리게 하거나 성령의 능력으로써 전달된 하나하나의 문장에 내포되어 있는 지혜를 이해할 능력은 결코 가지고 있지 않다! 사람이 자기 동료들을 속이고, 속임수가 속임수를 뒤따르며, 악한 자의 자녀들이 어리석은 자와 배우지 못한 자를 꾀어내는 힘을 가져서 드디어는 오직 지어낸 이야기만을 많은 사람에게 공급하며 거짓의 열매가 경솔한 자를 그 흐름에 싣고 무덤으로 운반해 가기에 이를지도 모른다. 그러나 그분의 사랑의 손가락으로 한 번의 만져 주심은, 그렇다, 천상의 세계에서 오는 한 줄기의 영광 또는 영원의 품에서 구주의 입에서 나오는 한 마디 말씀은 이 모든 것을 쳐서 무의미한 것이 되게 하며 이를 마음에서 영원히 지워 없앤다. 우리가 천사의 면전에 있었다는 확신, 우리가 예수의 음성을 들었다는 확실성, 그리고 하나님의 뜻으로써 말하게 하시는 대로 순결한 분에게서 흘러나왔던 훼손되지 않은 진리는 내게 있어 도저히 표현할 수 없는 것들이다. 나는 내가 머물도록 허락되는 동안 경탄과 감사함으로 구주의 선하심의 이 나타나심을 항상 바라볼 것이며, 완전함이 거하고 죄가 결코 올 수 없는 그 처소에서, 결코 그침이 없는 그날에 찬미하게 되기를 바라 마지않는다.”－메신저 앤드 애드보케이트(
                  - generic [ref=e394]: Messenger and Advocate
                  - text: ) 제1권(1834년10월), 14~16 쪽.
    - complementary [ref=e395]