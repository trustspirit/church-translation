                  - superscript [ref=e308]: ㄱ
                  - text: 태만하여
                - text: 그것들을 잃는다면 나는 끊어버림을 당할 것이나, 그 사자가 이를 달라 할 때까지 내가 온 힘을 다하여
                - link "ㄴ보전하려고" [ref=e309] [cursor=pointer]:
                  - /url: /study/scriptures/pgp/js-h/1?lang=kor&id=17#note59b
                  - superscript [ref=e310]: ㄴ
                  - text: 보전하려고
                - text: 애쓴다면 그것들은 보호될 것이라고 하였다.
              - paragraph [ref=e311]: 60 나는 그것들을 안전하게 지키도록 그처럼 엄한 당부를 받은 이유와 내가 내 손에 요구되는 일을 끝내면 그가 이를 가지러 오겠다고 한 이유를 곧 알게 되었다. 그것은 내가 그것들을 가지고 있다는 사실이 알려지자마자 이를 내게서 빼앗아가려고 온갖 격렬한 수단이 다 사용되었기 때문이었다. 그 목적을 위하여 생각해 낼 수 있는 모든 술책이 다 동원되었다. 핍박은 이전보다 더 혹독하고 격심해졌으며 수많은 무리가 할 수만 있으면 그것들을 내게서 빼앗아 가려고 끊임없이 노리고 있었다. 그러나 내가 이를 사용하여 내게 요구된 일을 끝낼 때까지 하나님의 지혜로 그것들은 내 손에 안전히 보관되었다. 약속된 대로 사자가 이를 가지러 왔을 때 나는 그것들을 그에게 넘겨주었고, 일천팔백삼십팔년 오월 이일인 오늘에 이르기까지 그가 이를 간직하고 있다.
              - paragraph [ref=e312]:
                - text: 61 그러나 동요는 여전히 계속되었고 천 개의 혀를 가진 소문은 항상 부친의 가족에 대해서, 또 나 자신에 대해서 거짓을 유포시키고 있었다. 만일 내가 그 천분의 일만을 말한다 해도 족히 여러 권의 책이 될 것이다. 그러나 핍박이 심해져서 견딜 수 없게 되었으므로 나는 맨체스터를 떠나 내 아내와 함께 펜실베이니아 주 사스케하나 군으로 가지 않을 수 없었다. 출발하려고 준비하는 동안－몹시 가난하고 우리에게 닥친 핍박이 너무도 심했기 때문에 형편이 달라질 가망은 없었는데－이러한 고난 중에
