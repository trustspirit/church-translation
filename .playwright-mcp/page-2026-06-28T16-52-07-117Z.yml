              - paragraph [ref=e91]:
                - text: 12 경전의 어느 구절도, 이때 이 구절이 내 마음에 임한 것보다 더 힘차게 사람의 마음에 임한 적은 결단코 없었다. 그 구절은 마치 큰 힘을 지니고 내 마음의 느낌 속으로 속속들이 파고드는 것 같았다. 하나님에게서 오는 지혜를 필요로 하는 사람이 있다면 바로 나라는 사실을 알았기에, 나는 거듭거듭 이 구절에 대해 깊이 생각하였다. 왜냐하면 어떻게 행동해야 할지 나는 몰랐고, 또 내가 그때 가지고 있던 것 이상의 지혜를 얻을 수 있기 전에는 나는 결코 알 수 없을 것이기 때문이었다. 이것은 서로 다른 교파의 종교 교사들이 같은 성경 구절을 너무나 서로 다르게
