              - paragraph [ref=e272]: 47 이 세 번째 방문 후에 그는 그전처럼 다시 하늘로 올라갔고 나는 다시 내가 방금 겪은 기이한 일에 대하여 깊이 생각하게 되었다. 하늘의 사자가 세 번째로 내게서 떠나 올라간 거의 직후에 닭이 울었고, 나는 동이 트려는 것을 알게 되었으며, 그리하여 우리의 대화가 밤새도록 계속되었음을 알았다.
              - paragraph [ref=e273]: 48 잠시 후에 나는 침대에서 일어나 평상시대로 해야 할 일을 하러 갔다. 그러나 다른 때처럼 일을 하려 하였을 때 나는 기력이 너무나 소진되어 전혀 아무것도 할 수 없음을 알게 되었다. 나와 함께 일하던 부친이 무슨 좋지 않은 일이 있는 줄 알고 나더러 집에 가라고 말씀하셨다. 나는 집으로 가려는 생각으로 출발하였으나 우리가 있던 밭의 울타리를 지나려 하였을 때, 완전히 기진하여 땅에 쓰러졌으며, 나는 한동안 아무것도 의식하지 못했다.
              - paragraph [ref=e274]:
                - text: 49 내가 생각해 낼 수 있는 첫 번째 일은 내 이름을 부르며 나에게 말을 거는 음성이었다. 내가 쳐다보니, 바로 그 사자가 그전처럼 빛에 둘러싸여 내 머리 위에 서 있는 것이 보였다. 이어서 그는 또다시 지난밤에 내게 전하였던 말을 모두 나에게 다시 말하고, 내
