              - paragraph [ref=e281]:
                - text: 52 나는 흙을 치운 다음, 지렛대를 구해다가 돌 가장자리 밑에 고정시키고 약간의 힘을 주어 들어 올렸다. 안을 들여다보니, 정말 거기에는 사자가 말한 대로
