                  - text: 에머
                - text: 헤일을 본 것은 그 곳에서였다. 1827년 1월 18일 우리는 결혼하였는데, 내가 아직 스톨씨에게 고용되어 있을 때였다.
              - paragraph [ref=e303]:
                - text: 58 내가 시현을 보았다고 계속 주장함으로 인하여
