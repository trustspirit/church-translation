                  - text: 조셉
                - text: 스미스 일세는 버몬트 주를 떠나 뉴욕 주 온타리오 (현재의 웨인) 군 팔마이라로 이사하였다. 팔마이라로 온 지 약 사 년째 되던 해에 나의 부친은 자신의 가족을 데리고 같은 온타리오 군 내에 있는 맨체스터로 이사하였다－
              - paragraph [ref=e65]:
