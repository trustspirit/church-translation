              - paragraph [ref=e96]:
                - text: 13 드디어 나는 암흑과 혼란 속에 머물든가, 그렇지 않으면 야고보가 지시하는 대로, 즉 하나님께 구하든가 해야겠다는 결론에 이르렀다. 나는 마침내
