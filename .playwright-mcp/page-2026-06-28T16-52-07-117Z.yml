              - paragraph [ref=e288]: 53 나는 그것들을 꺼내려 하였으나 사자가 금하였으며 그것들을 꺼낼 시기가 아직 이르지 않았고, 그때로부터 사 년까지는 이르지 아니하리라는 것을 다시 알려 주었다. 그러나 그는 내가 그때부터 정확히 일 년 후에 그 곳에 와야 하며, 거기에서 그가 나를 만날 것이며, 판을 얻을 때가 오기까지 내가 계속해서 그렇게 해야 한다고 내게 말했다.
