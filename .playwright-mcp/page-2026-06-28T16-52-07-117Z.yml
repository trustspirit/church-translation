                - text: ).
              - paragraph [ref=e296]: 55 내 부친의 생활 형편이 매우 어려웠기에, 우리는 일당을 받고 일하거나 그렇지 않으면 달리 할 수 있는대로 기회를 찾아 우리 손으로 직접 일하지 않으면 안 되었다. 우리는 때로는 집에 있었고, 때로는 집을 떠나 있었는데, 계속해서 일함으로써 편안한 생계를 유지할 수 있었다.
              - paragraph [ref=e297]:
                - text: 56 1823년 내 부친의 가족은 내 맏형
                - link "ㄱ앨빈의" [ref=e298] [cursor=pointer]:
                  - /url: /study/scriptures/pgp/js-h/1?lang=kor&id=17#note56a
                  - superscript [ref=e299]: ㄱ
                  - text: 앨빈의
                - text: 사망으로 큰 고통을 겪었다. 1825년 10월 나는 뉴욕 주 세낭고 군에 사는 조시아 스톨이라 하는 노신사에게 고용되었다. 그는 펜실베이니아 주 사스케하나 군 하모니에서 스페인 사람들이 개발한 은광에 대해 들은 바가 있어서, 내가 그에게 고용되기 전에, 할 수 있으면 광맥을 발견해 보려고 발굴 작업을 해 오던 중이었다. 내가 가서 그와 함께 지내게 된 이후에 그는 그의 다른 일꾼들과 함께 나를 데리고 가서 은광 발굴 작업을 했고, 이 곳에서 나는 한달 가까이 일을 계속했으나, 우리의 노력은 성공하지 못하였으며 마침내 나는 그 노신사를 설득하여 발굴을 중단하게 하였다. 내가 돈 발굴가였다는 이야기가 세상에 널리 퍼진 것은 이 때문이었다.
              - paragraph [ref=e300]:
                - text: 57 내가 이같이 고용되어 있는 동안 그 지방의 아이잭 헤일씨 댁에 하숙을 하게 되었는데 내가 처음 내 아내 (헤일씨의 딸)
