              - paragraph [ref=e277]: 50 나는 순종하여 밭에 계시는 부친에게 돌아가 그에게 자초지종을 말씀드렸다. 부친은 그것이 하나님에게서 온 것이라고 하시며 내게 사자가 명한 대로 가서 행하라고 하셨다. 나는 밭을 떠나 사자가 판이 묻혀 있다고 했던 장소로 갔고, 그에 관해 내가 보았던 시현이 뚜렷했던지라 나는 그 곳에 도착하자마자 그 자리를 알 수 있었다.
              - paragraph [ref=e278]:
                - text: 51 뉴욕 주 온타리오 군 맨체스터 마을 인근에, 그 근방에서는 제일 높은 큼직한
                - link "ㄱ산이" [ref=e279] [cursor=pointer]:
