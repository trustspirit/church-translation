              - paragraph [ref=e99]:
                - text: 14 그래서 이 결심 곧 하나님께 구하기로 한 나의 결심에 따라 나는 그렇게 해 보고자 숲으로 들어갔다. 때는 일천팔백이십년 이른 봄 아름답고 맑게 갠 날 아침이었다. 내가 그러한 시도를 한 것은 나의 평생에 처음이었는데, 이는 나의 모든 염려 중에서도 내가 아직 소리 내어
