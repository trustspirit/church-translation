                  - superscript [ref=e101]: ㄱ
                  - text: 기도하기를
                - text: 시도한 적은 한 번도 없었기 때문이었다.
              - paragraph [ref=e102]: 15 내가 이전에 가고자 계획했던 곳으로 들어간 뒤에 주위를 살펴 나 혼자임을 확인한 후, 나는 무릎을 꿇고 내 마음의 소원을 하나님께 고하기 시작하였다. 그렇게 하기 시작하자마자, 곧바로 나는 나를 완전히 압도하는 어떤 힘에 사로잡혔고, 그 힘이 놀라운 영향력을 내게 미쳐 내 혀를 묶어서 나는 말을 할 수가 없었다. 캄캄한 어둠이 내 주위에 모여들었고, 한동안은 내가 갑작스런 멸망을 당할 운명에 놓인 것만 같았다.
              - paragraph [ref=e103]:
                - text: 16 그러나 나를 사로잡은 이 원수의 힘에서 나를 건져내 주시도록 하나님을
