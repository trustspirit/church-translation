                  - /url: /study/scriptures/pgp/js-h/1?lang=kor&id=17#note58a
                  - superscript [ref=e305]: ㄱ
                  - text: 핍박은
                - text: 여전히 나를 따라다녔고, 내 아내의 친정 가족은 우리가 결혼하는 것에 대해 매우 심하게 반대했다. 그러므로 나는 부득이 내 아내를 다른 곳으로 데리고 가야 했고, 우리가 가서 결혼한 곳은 뉴욕 주 세낭고 군 사우스베인브릿지에 있는 타빌 치안판사의 집이었다. 결혼하자마자 나는 스톨씨에게서 나와 내 부친에게로 가서 그 계절은 부친과 함께 농사를 지었다.
              - paragraph [ref=e306]:
                - text: 59 드디어 판과 우림과 둠밈과 가슴판을 얻을 때가 이르렀다. 일천팔백이십칠년 구월 이십이일, 또 한 해가 다 되어 늘 하던 대로 그것들이 묻혀 있는 곳으로 가자, 바로 그 하늘의 사자가 다음과 같은 명령과 함께 그것들을 내게 내주었다. 즉 내가 이에 대해 책임을 져야 하며 만일 내가 소홀히 하거나 나 자신이 조금이라도
                - link "ㄱ태만하여" [ref=e307] [cursor=pointer]:
