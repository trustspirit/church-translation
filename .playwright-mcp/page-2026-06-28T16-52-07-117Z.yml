                  - superscript [ref=e263]: ㄱ
                  - text: 명상에
                - text: 잠겨 있을 때, 갑자기 나는 내 방에 다시 빛이 들기 시작하는 것을 발견하였다. 전과 같이 순식간에 바로 그 하늘의 사자가 다시 내 침대 곁에 있었다.
              - paragraph [ref=e264]: 45 그는 이야기를 시작하여 처음 방문 때 전하였던 말을 한 마디도 틀리지 아니하고 그대로 다시 전하였고, 그런 후에, 기근과 검과 역병으로 인한 큰 황폐로 큰 심판이 땅 위에 임하며 이 두려운 심판이 이 세대에 이 땅에 임하리라는 것을 내게 알려 주었다. 이 말을 마친 뒤 그는 다시 그전처럼 하늘로 올라갔다.
              - paragraph [ref=e265]:
