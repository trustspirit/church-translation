                  - superscript [ref=e75]: ㅁ
                  - text: 새뮤얼
                - text: 해리슨, 윌리엄, 돈 칼로스와 나의 누이들인 소프로니아, 캐더린 그리고 루시이다.
              - paragraph [ref=e76]:
                - text: 5 우리가 맨체스터로 이사 온 지 이 년째 되던 해의 어느 때에, 우리가 살고 있던 곳에 종교 문제에 대한 이례적인 동요가 일어났다. 그것은 감리교에서 시작되었으나, 곧 그 지방에 있는 모든 교파에 퍼지게 되었다. 실로 그 지방의 온 지역이 동요에 휘말린 것 같았는데, 큰 무리가 서로 다른 종파에 가담하였고, 이것은 백성들 사이에 적지 않은 소란과 분열을 일으켰다. 어떤 이들은
                - link "ㄱ“여기를" [ref=e77] [cursor=pointer]:
                  - /url: /study/scriptures/pgp/js-h/1?lang=kor&id=17#note5a
                  - superscript [ref=e78]: ㄱ
                  - text: “여기를
                - text: 보라” 다른 이들은 “저기를 보라”고 외쳤다. 어떤 이들은 감리교를, 어떤 이들은 장로교를, 또 어떤 이들은 침례교를 위하여 논쟁을 벌이고 있었다.
              - paragraph [ref=e79]:
                - text: 6 이들 여러 교파로 개종한 개종자들이 개종할 때에 표현했던 큰 사랑에도 불구하고, 또 이 종교적 감정의 심상치 않은 장면을 일으키며 조장하는 데 적극적인 여러 교회의 목사들이, 그들이 즐겨 부르는 대로, 모든 사람을 개종시키기 위하여, 자기가 좋아하는 교파에 가입하게 하라며 나타냈던 큰 열의에도 불구하고, 개종자들이 갈라지기 시작하여 누구는 이 종파, 누구는 저 종파에 속하자, 성직자나 개종자 모두의 좋아보였던 감정은 사실보다는 가식적인 것 같았다. 왜냐하면 이에 의해 대혼란과 악감정이 뒤따랐으며－성직자는 성직자와, 개종자는 개종자와 다투게 되었고, 그리하여 그들이 가졌던 서로에 대한 좋은 감정은, 설령 그들이 조금이라도 가졌었다 해도,
                - link "ㄱ언쟁과" [ref=e80] [cursor=pointer]:
                  - /url: /study/scriptures/pgp/js-h/1?lang=kor&id=17#note6a
                  - superscript [ref=e81]: ㄱ
                  - text: 언쟁과
                - text: 의견 충돌로 완전히 사라지고 말았기 때문이다.
              - paragraph [ref=e82]: 7 그 당시 나는 열네 살이었다. 내 친가에는 장로교파가 전파되었는데, 그 중 네 사람, 곧 나의 모친 루시, 나의 형제들인 하이럼, 새뮤얼 해리슨, 그리고 누이 소프로니아가 그 교회에 가입하였다.
              - paragraph [ref=e83]: 8 이 커다란 동요의 시기에 내 마음은 진지한 묵상에 잠기는 한편 심한 불안감에 사로잡히게 되었다. 그러나 비록 나의 감정이 깊고 종종 강렬하기까지 하였고, 비록 사정이 허락할 때마다 자주 그들의 집회에 참석하였으나, 여전히 나 자신은 이 모든 종파에서 떨어져 있었다. 시간이 지남에 따라 내 마음은 어느 정도 감리 교파에 호의를 가지게 되었고, 그에 속하고자 하는 소망을 얼마간 느꼈으나, 다른 종파들 사이에 혼란과 다툼이 너무 컸으므로 어리고 세상사에 미숙한 나로서는 누가 옳고 누가 그른지 어떤 확실한 결론에 이르는 것은 불가능했다.
              - paragraph [ref=e84]: 9 내 마음은 때때로 크게 흥분되었으며, 부르짖음과 소란은 매우 크고 그칠 새가 없었다. 장로교도는 침례교도와 감리교도에 대해 가장 단호하게 반대 의사를 나타내었고 그들의 잘못을 증명하기 위해, 또는 적어도 사람들로 하여금 그들이 잘못되어 있다고 생각하도록 만들기 위해 온갖 논리와 궤변을 다 사용하였다. 다른 한편으로 침례교도와 감리교도도 마찬가지로, 자기들의 교리를 세우고 다른 모든 교리가 그릇됨을 증명하려고 노력함에 있어 똑같이 열성적이었다.
              - paragraph [ref=e85]:
                - text: 10 이러한 언쟁과 의견의 혼돈 속에서 나는 종종, 어떻게 할 것인가? 이 모든 교파 중에 누가
                - link "ㄱ옳은가" [ref=e86] [cursor=pointer]:
                  - /url: /study/scriptures/pgp/js-h/1?lang=kor&id=17#note10a
                  - superscript [ref=e87]: ㄱ
                  - text: 옳은가
                - text: "? 아니면 그들 모두가 다 그릇된 것인가? 만일 그들 중 어느 하나가 옳다면, 그것은 어느 것이며, 나는 어떻게 그것을 알 수 있을까? 하고 자문해 보았다."
              - paragraph [ref=e88]:
                - text: 11 내가 이들 종교적 열성자들의 논쟁으로 야기된 극심한 어려움으로 고민하고 있을 때, 하루는
