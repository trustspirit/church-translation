                  - /url: /study/scriptures/pgp/js-h/1?lang=kor&id=17#note1b
                  - superscript [ref=e56]: ㄴ
                  - text: 일어남과
                - text: 발전에 관련하여 악의를 품은 교활한 사람들이 유포시킨 소문이 많으며, 이 모든 것은 그것을 지어낸 사람들이 이 교회의 교회로서의 명성과 세상에서의 발전을 저해하려 기도한 것이므로－나는 세간의 잘못된 생각을 바로잡고, 진리를 알고자 하는 모든 사람에게 나 자신과 교회에 관련된 사실을 내가 알고 있는 범위 안에서 일어난 그대로 알리기 위해 이 역사를 기록하기에 이르렀다.
              - paragraph [ref=e57]:
                - text: 2 이 역사에서 나는 이 교회에 관련된 여러 사건을 일어났던 그대로 또는 현재 있는 그대로 진실하고 올바르게 진술하겠거니와, 본 교회는 이제
