                    - paragraph [ref=e52]: 경전 안내서는 성경, 몰몬경, 교리와 성약, 값진 진주에서 선정된 교리, 원리, 사람 및 장소에 대해 정의를 내린다. 또한 각 주제를 공부하는 데 필요한 핵심 참조 성구를 제공한다. 이 안내서는 개인 및 가족이 경전 공부를 하는 데 도움이 될 수 있다. 그리고 복음에 관한 질문에 답하고, 경전에 있는 주제를 공부하고, 말씀 및 공과를 준비하며, 복음에 대한 지식과 간증을 키우는 데 도움이 될 수 있다.
