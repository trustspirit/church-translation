              - listitem [ref=e54]:
                - link "주제 목록(가나다순) 사용법. 경전 안내서는 복음 주제에 관한 가나다순의 목록이다. 여기에는 각 주제에 대한 간략한 정의가 들어 있으며 그 주제를 가장 잘 나타내는 참조 성구들이 제시되어 있다. 각 참조 성구 앞에는 경전이 짧게 인용되거나 요약되어 있다. 참조 성구는 구약전서, 신약전서, 몰몬경, 교리와 성약, 값진 진주의 순으로 표기되어 있다. 다음은 한 예이다. 예" [ref=e55] [cursor=pointer]:
